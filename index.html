<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>大人向け 献立メーカーPro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { 
            --primary: #4f46e5;
            --primary-hover: #4338ca;
        }
        body { 
            background-color: #f9fafb;
            -webkit-tap-highlight-color: transparent;
        }
        
        /* ラジオボタン共通スタイル */
        .custom-radio:checked + span {
            background-color: var(--primary);
            color: white;
            border-color: var(--primary);
            font-weight: 600;
            box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.3);
            transform: translateY(-1px);
        }
        .radio-label-span {
            transition: all 0.2s ease;
        }

        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* スクロールバーのカスタマイズ */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f1f1; 
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
    </style>
</head>
<body class="text-gray-800 antialiased pb-20">

<div class="max-w-lg mx-auto bg-white min-h-screen shadow-sm sm:rounded-xl sm:my-8 sm:min-h-0 sm:pb-8 overflow-hidden">
    
    <header class="bg-indigo-600 text-white p-4 flex justify-between items-center relative z-10 shadow-md">
        <h1 class="text-xl font-bold tracking-wider">献立メーカー<span class="font-light text-indigo-200">Pro</span></h1>
        <button onclick="toggleSettings()" class="text-indigo-100 hover:text-white transition p-2 focus:outline-none flex items-center bg-indigo-700/50 rounded-lg px-3 py-1.5">
            <span id="key-status-icon" class="mr-1 text-xs">⚠️</span>
            <span class="text-sm font-medium">設定</span>
        </button>
    </header>

    <div id="settings-area" class="hidden bg-gray-50 border-b border-gray-200 p-6 shadow-inner transition-all h-[80vh] overflow-y-auto">
        <h2 class="text-lg font-bold text-gray-800 mb-4 border-b-2 border-indigo-200 pb-2 flex items-center">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2 text-indigo-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
            アプリ設定
        </h2>

        <div class="mb-6 bg-white p-4 rounded-xl border border-gray-200 shadow-sm">
            <h3 class="text-sm font-bold text-gray-700 mb-2">🔑 APIキー</h3>
            <p class="text-xs text-gray-500 mb-3">Google AI StudioのAPIキー。</p>
            
            <div id="current-key-status" class="mb-3 p-2 bg-gray-50 border border-gray-200 rounded flex justify-between items-center hidden">
                <span id="masked-key" class="font-mono text-gray-600 text-xs tracking-widest"></span>
                <button onclick="clearApiKey()" class="text-red-500 hover:text-red-700 text-xs px-2 py-1 bg-white border border-red-200 rounded transition">削除</button>
            </div>
            <input type="password" id="api-key" placeholder="APIキーを入力" class="w-full p-2 text-sm border border-gray-300 rounded focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
        </div>

        <div class="mb-6 bg-white p-4 rounded-xl border border-gray-200 shadow-sm">
            <h3 class="text-sm font-bold text-gray-700 mb-1 flex items-center">
                <span class="mr-1">🥦</span> いつもある食材・ストック
            </h3>
            <textarea id="stock-ingredients" rows="4" class="custom-scrollbar w-full p-2 text-sm border border-gray-300 rounded focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-gray-700 leading-relaxed"></textarea>
        </div>

        <div class="mb-6 bg-white p-4 rounded-xl border border-gray-200 shadow-sm">
            <h3 class="text-sm font-bold text-gray-700 mb-1 flex items-center">
                <span class="mr-1">🧂</span> いつもある調味料・油
            </h3>
            <textarea id="stock-seasonings" rows="4" class="custom-scrollbar w-full p-2 text-sm border border-gray-300 rounded focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-gray-700 leading-relaxed"></textarea>
            <div class="mt-2 text-right">
                <button onclick="resetStockToDefault()" class="text-xs text-indigo-600 hover:text-indigo-800 underline">初期値に戻す</button>
            </div>
        </div>

        <div class="flex justify-end space-x-3 sticky bottom-0 bg-gray-50 py-2 border-t border-gray-200">
            <button onclick="toggleSettings()" class="px-5 py-2 text-sm text-gray-600 bg-white border border-gray-300 rounded-lg hover:bg-gray-100 font-medium shadow-sm transition">キャンセル</button>
            <button onclick="saveAllSettings()" class="px-5 py-2 text-sm text-white bg-indigo-600 rounded-lg hover:bg-indigo-700 shadow-md font-bold transition">設定を保存</button>
        </div>
    </div>

    <main class="p-6">
        <section class="mb-6">
            <h2 class="text-lg font-bold text-gray-800 mb-2 flex items-center">
                <span class="bg-indigo-100 text-indigo-800 text-sm w-6 h-6 rounded-full inline-flex items-center justify-center mr-2">1</span>
                今日使いたい食材
            </h2>
            <textarea id="ingredients-text" rows="2" placeholder="例：特売の鶏肉、少し残ったキャベツ" 
                      class="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition shadow-sm text-base placeholder-gray-400"></textarea>
            
            <div class="mt-3 flex items-center space-x-3">
                <label for="image-input" class="cursor-pointer flex-1 bg-white border border-gray-300 rounded-xl p-3 text-center hover:bg-gray-50 transition shadow-sm flex items-center justify-center space-x-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
                    </svg>
                    <span class="font-medium text-gray-700 text-sm">カメラで撮る / 画像選択</span>
                </label>
                <input type="file" id="image-input" accept="image/*" capture="environment" class="hidden" onchange="previewImage(this)">
            </div>
            
            <div id="image-preview-container" class="hidden mt-3 relative animate-fade-in">
                <img id="image-preview" class="w-full h-40 object-cover rounded-xl shadow-md border border-gray-200">
                <button onclick="clearImage()" class="absolute top-2 right-2 bg-white rounded-full p-1.5 shadow-lg text-red-500 hover:bg-red-50 focus:outline-none">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" />
                    </svg>
                </button>
            </div>
        </section>

        <section class="mb-6">
            <h2 class="text-lg font-bold text-gray-800 mb-2 flex items-center">
                <span class="bg-indigo-100 text-indigo-800 text-sm w-6 h-6 rounded-full inline-flex items-center justify-center mr-2">2</span>
                細かい要望・補足 (任意)
            </h2>
            <textarea id="requirements-text" rows="2" placeholder="例：フライパン1つで作りたい、さっぱりしたものがいい" 
                      class="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition shadow-sm text-base placeholder-gray-400 bg-gray-50"></textarea>
        </section>

        <section class="mb-6">
            <h2 class="text-lg font-bold text-gray-800 mb-3 flex items-center">
                <span class="bg-indigo-100 text-indigo-800 text-sm w-6 h-6 rounded-full inline-flex items-center justify-center mr-2">3</span>
                今日の気分
            </h2>
            <div class="grid grid-cols-2 gap-3 mb-3">
                <label class="cursor-pointer">
                    <input type="radio" name="genre" value="和風" class="custom-radio hidden" checked>
                    <span class="radio-label-span block text-center p-3 border-2 border-gray-200 rounded-xl text-gray-600 bg-white">🇯🇵 和風</span>
                </label>
                <label class="cursor-pointer">
                    <input type="radio" name="genre" value="洋風" class="custom-radio hidden">
                    <span class="radio-label-span block text-center p-3 border-2 border-gray-200 rounded-xl text-gray-600 bg-white">🇺🇸 洋風</span>
                </label>
                <label class="cursor-pointer">
                    <input type="radio" name="genre" value="中華風" class="custom-radio hidden">
                    <span class="radio-label-span block text-center p-3 border-2 border-gray-200 rounded-xl text-gray-600 bg-white">🇨🇳 中華風</span>
                </label>
                <label class="cursor-pointer">
                    <input type="radio" name="genre" value="ジャンル問わず、食材に最も合う美味しい組み合わせ" class="custom-radio hidden">
                    <span class="radio-label-span block text-center p-3 border-2 border-gray-200 rounded-xl text-gray-600 bg-white text-sm flex items-center justify-center">🎲 おまかせ</span>
                </label>
            </div>
        </section>

        <section class="mb-6">
            <h2 class="text-lg font-bold text-gray-800 mb-3 flex items-center">
                <span class="bg-indigo-100 text-indigo-800 text-sm w-6 h-6 rounded-full inline-flex items-center justify-center mr-2">4</span>
                提案内容
            </h2>
            <div class="flex space-x-3">
                <label class="cursor-pointer flex-1">
                    <input type="radio" name="mode" value="full" class="custom-radio hidden" checked>
                    <span class="radio-label-span block text-center p-3 border-2 border-gray-200 rounded-xl text-gray-600 bg-white text-sm font-medium">🍱 献立 (主菜+副菜)</span>
                </label>
                <label class="cursor-pointer flex-1">
                    <input type="radio" name="mode" value="side_only" class="custom-radio hidden">
                    <span class="radio-label-span block text-center p-3 border-2 border-gray-200 rounded-xl text-gray-600 bg-white text-sm font-medium">🥗 副菜のみ (3案)</span>
                </label>
            </div>
        </section>

        <section class="mb-8">
            <h2 class="text-lg font-bold text-gray-800 mb-3 flex items-center">
                <span class="bg-indigo-100 text-indigo-800 text-sm w-6 h-6 rounded-full inline-flex items-center justify-center mr-2">5</span>
                追加オプション
            </h2>
            <div class="flex flex-wrap gap-3">
                <label class="cursor-pointer">
                    <input type="checkbox" id="opt-jitan" class="peer hidden">
                    <span class="block px-4 py-2 border-2 border-gray-200 rounded-full text-sm text-gray-600 font-medium peer-checked:bg-blue-100 peer-checked:text-blue-800 peer-checked:border-blue-400 transition-all select-none shadow-sm">⏱️ 時短</span>
                </label>
                <label class="cursor-pointer">
                    <input type="checkbox" id="opt-oiwai" class="peer hidden">
                    <span class="block px-4 py-2 border-2 border-gray-200 rounded-full text-sm text-gray-600 font-medium peer-checked:bg-pink-100 peer-checked:text-pink-800 peer-checked:border-pink-400 transition-all select-none shadow-sm">🎉 お祝い</span>
                </label>
                <label class="cursor-pointer">
                    <input type="checkbox" id="opt-tsukurioki" class="peer hidden">
                    <span class="block px-4 py-2 border-2 border-gray-200 rounded-full text-sm text-gray-600 font-medium peer-checked:bg-green-100 peer-checked:text-green-800 peer-checked:border-green-400 transition-all select-none shadow-sm">🍱 作り置き</span>
                </label>
            </div>
        </section>

        <button id="submit-btn" onclick="generateRecipe()" 
                class="w-full bg-indigo-600 text-white font-bold text-lg py-4 rounded-xl shadow-lg hover:bg-indigo-700 transition-colors focus:ring-4 focus:ring-indigo-300 disabled:bg-gray-400 disabled:cursor-not-allowed flex justify-center items-center">
            <span id="btn-text">AIに提案してもらう</span>
            <div id="loading-spinner" class="hidden loader ml-3 border-t-white border-white/30 h-6 w-6 border-2"></div>
        </button>

        <div id="result-area" class="mt-8 hidden">
            <hr class="my-6 border-gray-200">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-xl font-bold text-gray-800 flex items-center text-indigo-700">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z" />
                    </svg>
                    <span id="result-title-text">今日の提案メニュー</span>
                </h2>
                <span id="season-badge" class="text-xs font-bold px-2 py-1 rounded-full bg-orange-100 text-orange-800 border border-orange-200 shadow-sm hidden">季節感アリ</span>
            </div>
            
            <div class="space-y-4" id="main-dishes-container"></div>

            <div id="side-dish-container-box" class="mt-6 bg-blue-50 border border-blue-100 rounded-xl p-5 shadow-sm hidden">
                <h3 class="font-bold text-blue-800 mb-2 flex items-center text-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-1" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-11a1 1 0 10-2 0v2H7a1 1 0 100 2h2v2a1 1 0 102 0v-2h2a1 1 0 100-2h-2V7z" clip-rule="evenodd" />
                    </svg>
                    おすすめの副菜 (1品)
                </h3>
                <div id="side-dish-container" class="text-gray-700 text-sm leading-relaxed"></div>
            </div>
        </div>
    </main>
</div>

<script>
    const DEFAULT_STOCK_INGREDIENTS = "にんじん、たまねぎ、キノコ類(えのき、しめじ)、葉物野菜(小松菜またはほうれん草)、豆腐、たまご、豚バラ、合挽き肉、パスタ、米、お麩、塩昆布、かつおぶし、トマト缶";
    const DEFAULT_STOCK_SEASONINGS = "醤油、塩、砂糖、味醂、味噌、酒、本だし、鶏ガラスープの元、コンソメ、ニンニクチューブ、生姜チューブ、白だし、鷹の爪、豆板醤、バター、オリーブオイル、サラダ油、ごま油、ブラックペッパー、一味とうがらし、トマトケチャップ、マヨネーズ、ウスターソース、オイスターソース";

    function showNotification(message, isError = false) {
        const div = document.createElement('div');
        div.className = `fixed bottom-4 left-1/2 transform -translate-x-1/2 px-6 py-3 rounded-full text-white font-medium text-sm shadow-xl z-50 transition-all duration-300 ${isError ? 'bg-red-500' : 'bg-gray-800'}`;
        div.style.opacity = '0';
        div.style.transform = 'translate(-50%, 20px)';
        div.textContent = message;
        document.body.appendChild(div);
        
        requestAnimationFrame(() => {
            div.style.opacity = '1';
            div.style.transform = 'translate(-50%, 0)';
        });
        setTimeout(() => {
            div.style.opacity = '0';
            div.style.transform = 'translate(-50%, 20px)';
            setTimeout(() => div.remove(), 4000);
        }, 4000);
    }

    function getSeasonalContext() {
        const month = new Date().getMonth() + 1;
        let seasonStr = "";
        let badgeText = "";
        if ([3, 4, 5].includes(month)) {
            seasonStr = "春（軽やかで春の訪れを感じるような味わい、新緑や彩り）";
            badgeText = "🌸 春の彩り";
        } else if ([6, 7, 8].includes(month)) {
            seasonStr = "夏（夏バテ防止のスタミナ系、食欲をそそるスパイシー・酸味を効かせたさっぱりした味わい）";
            badgeText = "🌻 夏のスタミナ";
        } else if ([9, 10, 11].includes(month)) {
            seasonStr = "秋（秋の味覚を感じさせる深い味わいや、きのこ等との相性）";
            badgeText = "🍂 秋の味覚";
        } else {
            seasonStr = "冬（体が温まるようなほっこりした味わい、または濃厚な味付け）";
            badgeText = "⛄️ 冬の温もり";
        }
        return { month, seasonStr, badgeText };
    }

    function getSystemPrompt(mode) {
        const seasonal = getSeasonalContext();
        
        const currentStockIngredients = localStorage.getItem('konda_stock_ingredients') || DEFAULT_STOCK_INGREDIENTS;
        const currentStockSeasonings = localStorage.getItem('konda_stock_seasonings') || DEFAULT_STOCK_SEASONINGS;
        
        let formatStr = "";
        if (mode === "side_only") {
            formatStr = `ユーザーは【副菜のみ】の提案を求めています。主菜は不要です。
指定食材や常備食材を活用した、それぞれ異なるバリエーションの副菜を3つ提案してください。

【出力形式】必ず以下の形式の有効なJSONオブジェクトのみで出力してください。
{
  "sideDishes": [
    {"name": "副菜名1", "recipe": "簡潔な作り方(2〜3行以内)。"},
    {"name": "副菜名2", "recipe": "簡潔な作り方(2〜3行以内)。"},
    {"name": "副菜名3", "recipe": "簡潔な作り方(2〜3行以内)。"}
  ]
}`;
        } else {
            formatStr = `ユーザーは夕食の【献立（主菜＋副菜）】の提案を求めています。

【出力形式】必ず以下の形式の有効なJSONオブジェクトのみで出力してください。
{
  "mainDishes": [
    {"name": "主菜名1", "recipe": "簡潔な作り方(3行以内)。スパイスや薬味を効かせた大人向けのアレンジを強調すること。"},
    {"name": "主菜名2", "recipe": "簡潔な作り方(3行以内)。"},
    {"name": "主菜名3", "recipe": "簡潔な作り方(3行以内)。"}
  ],
  "sideDish": {
    "name": "副菜名", 
    "recipe": "主菜に合う、常備食材のみで作れる副菜の作り方(1行程度)"
  }
}`;
        }

        return `あなたは大人向けのプロの料理研究家です。
我が家には常に以下のストックがあります。これらは自由に使って構いません。

【常備食材（肉・野菜・その他）】
${currentStockIngredients}

【常備調味料・油類】
${currentStockSeasonings}

【★味付けに関する重要な指示★】
手軽な調味料（白だし、塩昆布、めんつゆ等）は便利ですが、提案する3案のレシピがそれらの味ばかりに偏らないようにしてください。
醤油、味噌、オイスターソース、豆板醤、塩コショウ、マヨネーズなど、ストックにある様々な調味料をバランス良く活用し、味のバリエーション（さっぱり、こってり、スパイシーなど）を持たせてください。

【季節感の考慮】
現在は ${seasonal.month}月 です。提案するメニューや味付けには、少しだけ ${seasonal.seasonStr} のニュアンスを取り入れてください。

ユーザーが「今日使いたい食材」「細かい要望・補足」「希望のジャンル」「追加オプション」を入力します。
これらに基づいて、大人が満足するメニューを提案してください。

${formatStr}`;
    }

    function toggleSettings() {
        const area = document.getElementById('settings-area');
        area.classList.toggle('hidden');
        if (!area.classList.contains('hidden')) {
            loadSettingsToForm();
            updateKeyStatusUI();
        }
    }

    function loadSettingsToForm() {
        document.getElementById('stock-ingredients').value = localStorage.getItem('konda_stock_ingredients') || DEFAULT_STOCK_INGREDIENTS;
        document.getElement
