<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>大人向け 献立メーカーPro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --primary: #4f46e5; }
        body { background-color: #f9fafb; -webkit-tap-highlight-color: transparent; }
        .custom-radio:checked + span { background-color: var(--primary); color: white; font-weight: 600; box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.3); transform: translateY(-1px); }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="text-gray-800 antialiased pb-20">

<div class="max-w-lg mx-auto bg-white min-h-screen shadow-sm sm:rounded-xl sm:my-8 sm:min-h-0 sm:pb-8 overflow-hidden">
    
    <header class="bg-indigo-600 text-white p-4 flex justify-between items-center relative z-10 shadow-md">
        <h1 class="text-xl font-bold tracking-wider">献立メーカー<span class="font-light text-indigo-200">Pro</span></h1>
        <button onclick="toggleSettings()" class="text-indigo-100 hover:text-white transition p-2 focus:outline-none flex items-center bg-indigo-700/50 rounded-lg px-3 py-1.5">
            <span id="key-status-icon" class="mr-1 text-xs">⚠️</span>
            <span class="text-sm font-medium">設定</span>
        </button>
    </header>

    <div id="settings-area" class="hidden bg-gray-50 border-b border-gray-200 p-6 shadow-inner transition-all h-[80vh] overflow-y-auto">
        <h2 class="text-lg font-bold text-gray-800 mb-4 border-b-2 border-indigo-200 pb-2 flex items-center">⚙️ アプリ設定</h2>
        <div class="mb-6 bg-white p-4 rounded-xl border border-gray-200 shadow-sm">
            <h3 class="text-sm font-bold text-gray-700 mb-2">🔑 APIキー</h3>
            <div id="current-key-status" class="mb-3 p-2 bg-gray-50 border border-gray-200 rounded flex justify-between items-center hidden">
                <span id="masked-key" class="font-mono text-gray-600 text-xs tracking-widest"></span>
                <button onclick="clearApiKey()" class="text-red-500 hover:text-red-700 text-xs px-2 py-1 bg-white border border-red-200 rounded transition">削除</button>
            </div>
            <input type="password" id="api-key" placeholder="AQ...で始まるキーを入力" class="w-full p-2 text-sm border border-gray-300 rounded focus:ring-2 focus:ring-indigo-500">
        </div>
        <div class="mb-6 bg-white p-4 rounded-xl border border-gray-200 shadow-sm">
            <h3 class="text-sm font-bold text-gray-700 mb-1">🥦 常備食材</h3>
            <textarea id="stock-ingredients" rows="4" class="w-full p-2 text-sm border border-gray-300 rounded focus:ring-2 focus:ring-indigo-500 text-gray-700"></textarea>
        </div>
        <div class="mb-6 bg-white p-4 rounded-xl border border-gray-200 shadow-sm">
            <h3 class="text-sm font-bold text-gray-700 mb-1">🧂 常備調味料</h3>
            <textarea id="stock-seasonings" rows="4" class="w-full p-2 text-sm border border-gray-300 rounded focus:ring-2 focus:ring-indigo-500 text-gray-700"></textarea>
            <div class="mt-2 text-right"><button onclick="resetStockToDefault()" class="text-xs text-indigo-600 underline">初期値に戻す</button></div>
        </div>
        <div class="flex justify-end space-x-3 sticky bottom-0 bg-gray-50 py-2 border-t border-gray-200">
            <button onclick="toggleSettings()" class="px-5 py-2 text-sm text-gray-600 bg-white border border-gray-300 rounded-lg">キャンセル</button>
            <button onclick="saveAllSettings()" class="px-5 py-2 text-sm text-white bg-indigo-600 rounded-lg font-bold">保存</button>
        </div>
    </div>

    <main class="p-6">
        <section class="mb-6">
            <h2 class="text-lg font-bold text-gray-800 mb-2">1. 今日使いたい食材</h2>
            <textarea id="ingredients-text" rows="2" placeholder="例：キャベツ、豚肉" class="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 text-base"></textarea>
        </section>

        <section class="mb-6">
            <h2 class="text-lg font-bold text-gray-800 mb-2">2. 細かい要望 (任意)</h2>
            <textarea id="requirements-text" rows="2" placeholder="例：さっぱり、15分以内" class="w-full p-3 border border-gray-300 rounded-xl bg-gray-50 text-base"></textarea>
        </section>

        <section class="mb-6">
            <h2 class="text-lg font-bold text-gray-800 mb-3 text-sm">3. 今日の気分</h2>
            <div class="grid grid-cols-2 gap-3 mb-3">
                <label class="cursor-pointer"><input type="radio" name="genre" value="和風" class="custom-radio hidden" checked><span class="block text-center p-3 border-2 border-gray-200 rounded-xl bg-white">🇯🇵 和風</span></label>
                <label class="cursor-pointer"><input type="radio" name="genre" value="おまかせ" class="custom-radio hidden"><span class="block text-center p-3 border-2 border-gray-200 rounded-xl bg-white text-sm flex items-center justify-center">🎲 おまかせ</span></label>
            </div>
        </section>

        <section class="mb-8">
            <div class="flex space-x-3">
                <label class="cursor-pointer flex-1"><input type="radio" name="mode" value="full" class="custom-radio hidden" checked><span class="block text-center p-3 border-2 border-gray-200 rounded-xl bg-white text-xs font-medium">🍱 献立</span></label>
                <label class="cursor-pointer flex-1"><input type="radio" name="mode" value="side_only" class="custom-radio hidden"><span class="block text-center p-3 border-2 border-gray-200 rounded-xl bg-white text-xs font-medium">🥗 副菜のみ</span></label>
            </div>
        </section>

        <button id="submit-btn" onclick="generateRecipe()" class="w-full bg-indigo-600 text-white font-bold text-lg py-4 rounded-xl shadow-lg flex justify-center items-center">
            <span id="btn-text">AIに提案してもらう</span>
            <div id="loading-spinner" class="hidden loader ml-3 border-t-white border-white/30 h-6 w-6 border-2"></div>
        </button>

        <div id="result-area" class="mt-8 hidden">
            <h2 class="text-xl font-bold text-gray-800 text-indigo-700 mb-4" id="result-title-text">今日の提案</h2>
            <div class="space-y-4" id="main-dishes-container"></div>
            <div id="side-dish-container-box" class="mt-6 bg-blue-50 border border-blue-100 rounded-xl p-5 hidden">
                <h3 class="font-bold text-blue-800 mb-2 text-sm">おすすめの副菜</h3>
                <div id="side-dish-container" class="text-gray-700 text-sm leading-relaxed"></div>
            </div>
        </div>
    </main>
</div>

<script>
    const DEFAULT_STOCK_I = "にんじん、たまねぎ、豚バラ、豆腐、たまご";
    const DEFAULT_STOCK_S = "醤油、塩、砂糖、味噌、酒、本だし、油";

    function toggleSettings() {
        const area = document.getElementById('settings-area');
        area.classList.toggle('hidden');
        if (!area.classList.contains('hidden')) {
            document.getElementById('stock-ingredients').value = localStorage.getItem('konda_stock_ingredients') || DEFAULT_STOCK_I;
            document.getElementById('stock-seasonings').value = localStorage.getItem('konda_stock_seasonings') || DEFAULT_STOCK_S;
            updateKeyStatusUI();
        }
    }

    function saveAllSettings() {
        const k = document.getElementById('api-key').value.trim();
        if (k) localStorage.setItem('gemini_api_key', k);
        localStorage.setItem('konda_stock_ingredients', document.getElementById('stock-ingredients').value);
        localStorage.setItem('konda_stock_seasonings', document.getElementById('stock-seasonings').value);
        alert('設定を保存しました');
        toggleSettings();
        updateKeyStatusUI();
    }

    function updateKeyStatusUI() {
        const k = localStorage.getItem('gemini_api_key');
        const icon = document.getElementById('key-status-icon');
        const statusBox = document.getElementById('current-key-status');
        if (k) {
            document.getElementById('masked-key').textContent = k.substring(0, 4) + '...' + k.substring(k.length - 4);
            statusBox.classList.remove('hidden');
            icon.textContent = '✅';
        } else {
            statusBox.classList.add('hidden');
            icon.textContent = '⚠️';
        }
    }

    function resetStockToDefault() {
        if(confirm('初期値に戻しますか？')) {
            document.getElementById('stock-ingredients').value = DEFAULT_STOCK_I;
            document.getElementById('stock-seasonings').value = DEFAULT_STOCK_S;
        }
    }

    function clearApiKey() {
        if(confirm('APIキーを削除しますか？')) {
            localStorage.removeItem('gemini_api_key');
            updateKeyStatusUI();
        }
    }

    async function generateRecipe() {
        const k = localStorage.getItem('gemini_api_key');
        if (!k) { alert('設定からAPIキーを保存してください'); toggleSettings(); return; }
        
        const btn = document.getElementById('submit-btn');
        btn.disabled = true;
        document.getElementById('loading-spinner').classList.remove('hidden');

        try {
            const text = document.getElementById('ingredients-text').value;
            const mode = document.querySelector('input[name="mode"]:checked').value;
            
            // --- AIへの命令書 ---
            const prompt = `あなたはプロの料理研究家です。JSONのみで出力して。
食材：${text}、ストック：${localStorage.getItem('konda_stock_ingredients')}
${mode === "side_only" ? "副菜を3つ提案して。形式：{\"sideDishes\": [{\"name\":\"名\",\"recipe\":\"作り方\"}]}" : "主菜3案と副菜1案を。形式：{\"mainDishes\": [{\"name\":\"名\",\"recipe\":\"作り方\"}], \"sideDish\": {\"name\":\"名\",\"recipe\":\"作り方\"}}"}`;

            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${k}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ role: "user", parts: [{ text: prompt }] }],
                    generationConfig: { response_mime_type: "application/json" }
                })
            });

            // --- ここでエラーを詳しく診断 ---
            if (!response.ok) {
                const errJson = await response.json();
                const errMsg = errJson.error ? errJson.error.message : '不明なエラー';
                throw new Error(`【APIエラー】\nステータス: ${response.status}\n内容: ${errMsg}`);
            }

            const data = await response.json();
            const result = JSON.parse(data.candidates[0].content.parts[0].text);
            renderResults(result, mode);

        } catch (e) {
            alert(e.message + "\n\n※APIキーが正しくコピーできているか、Google AI StudioでGemini APIが有効か確認してください。");
        } finally {
            btn.disabled = false;
            document.getElementById('loading-spinner').classList.add('hidden');
        }
    }

    function renderResults(data, mode) {
        const mainC = document.getElementById('main-dishes-container');
        const sideBox = document.getElementById('side-dish-container-box');
        const sideC = document.getElementById('side-dish-container');
        mainC.innerHTML = ''; sideC.innerHTML = '';

        if (mode === 'side_only') {
            document.getElementById('result-title-text').textContent = '副菜の提案';
            sideBox.classList.add('hidden');
            data.sideDishes.forEach((d, i) => {
                mainC.innerHTML += `<div class="bg-white border-l-4 border-green-500 p-4 rounded shadow-sm mb-3"><h3 class="font-bold">${i+1}. ${d.name}</h3><p class="text-sm text-gray-600">${d.recipe}</p></div>`;
            });
        } else {
            document.getElementById('result-title-text').textContent = '今日の献立';
            sideBox.classList.remove('hidden');
            data.mainDishes.forEach((d, i) => {
                mainC.innerHTML += `<div class="bg-white border-l-4 border-indigo-500 p-4 rounded shadow-sm mb-3"><h3 class="font-bold">${i+1}. ${d.name}</h3><p class="text-sm text-gray-600">${d.recipe}</p></div>`;
            });
            sideC.innerHTML = `<p><strong>${data.sideDish.name}</strong><br>${data.sideDish.recipe}</p>`;
        }
        document.getElementById('result-area').classList.remove('hidden');
    }

    window.onload = updateKeyStatusUI;
</script>
</body>
</html>
