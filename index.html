<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>大人向け 献立メーカーPro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --primary: #4f46e5; }
        body { background-color: #f9fafb; -webkit-tap-highlight-color: transparent; }
        .custom-radio:checked + span { background-color: var(--primary); color: white; font-weight: 600; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="text-gray-800 pb-20">

<div class="max-w-lg mx-auto bg-white min-h-screen shadow-sm sm:rounded-xl sm:my-8 sm:pb-8 overflow-hidden">
    <header class="bg-indigo-600 text-white p-4 flex justify-between items-center relative z-10 shadow-md">
        <h1 class="text-xl font-bold tracking-wider">献立メーカーPro</h1>
        <button id="set-btn" onclick="toggleSettings()" class="text-indigo-100 hover:text-white transition p-2 bg-indigo-700/50 rounded-lg px-3 py-1.5 font-bold">
            ⚙️ 設定
        </button>
    </header>

    <div id="settings-area" class="hidden bg-gray-50 border-b border-gray-200 p-6 h-[70vh] overflow-y-auto">
        <h2 class="text-lg font-bold mb-4">⚙️ アプリ設定</h2>
        <div class="mb-4">
            <label class="block text-sm font-bold mb-1">🔑 APIキー</label>
            <input type="password" id="api-key" placeholder="AI Studioのキーを入力" class="w-full p-2 border rounded">
        </div>
        <div class="flex justify-end space-x-3 mt-4">
            <button onclick="toggleSettings()" class="px-5 py-2 text-sm bg-white border rounded-lg">閉じる</button>
            <button onclick="saveAllSettings()" class="px-5 py-2 text-sm text-white bg-indigo-600 rounded-lg font-bold">保存</button>
        </div>
    </div>

    <main class="p-6">
        <textarea id="ingredients-text" rows="2" placeholder="豚肉、たまねぎ" class="w-full p-3 border rounded-xl mb-4"></textarea>
        
        <button id="submit-btn" onclick="generateRecipe()" class="w-full bg-indigo-600 text-white font-bold text-lg py-4 rounded-xl shadow-lg flex justify-center items-center">
            AIに提案してもらう
            <div id="loading-spinner" class="hidden loader ml-3 border-t-white border-white/30 h-6 w-6 border-2"></div>
        </button>

        <div id="result-area" class="mt-8 hidden">
            <div id="main-dishes-container" class="space-y-4"></div>
        </div>
    </main>
</div>

<script>
    // --- 診断用：読み込み完了時にメッセージを出す ---
    window.onload = function() {
        console.log("App Loaded");
        alert("🎉 アプリの起動準備が整いました！\n設定ボタンが押せるようになっているはずです。");
    };

    function toggleSettings() {
        const area = document.getElementById('settings-area');
        area.classList.toggle('hidden');
    }

    function saveAllSettings() {
        const k = document.getElementById('api-key').value.trim();
        if (k) {
            localStorage.setItem('gemini_api_key', k);
            alert('APIキーを保存しました');
            toggleSettings();
        } else {
            alert('キーを入力してください');
        }
    }

    async function generateRecipe() {
        const k = localStorage.getItem('gemini_api_key');
        if (!k) { alert('設定からAPIキーを保存してください'); toggleSettings(); return; }
        
        const btn = document.getElementById('submit-btn');
        btn.disabled = true;
        document.getElementById('loading-spinner').classList.remove('hidden');

        try {
            const text = document.getElementById('ingredients-text').value;
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${k}`;
            const res = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ role: "user", parts: [{ text: text + "を使った献立をJSON形式で教えて" }] }],
                    generationConfig: { response_mime_type: "application/json" }
                })
            });
            const data = await res.json();
            alert("成功！AIが献立を考えました。");
        } catch (e) {
            alert('エラー: ' + e.message);
        } finally {
            btn.disabled = false;
            document.getElementById('loading-spinner').classList.add('hidden');
        }
    }
</script>
</body>
</html>
